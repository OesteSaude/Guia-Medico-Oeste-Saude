<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Credenciada - Oeste Saúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Log de Debug */
        #debugLog {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            max-height: 400px;
            background: #1a1a1a;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }

        .log-entry.error {
            color: #ff4444;
            border-left-color: #ff4444;
        }

        .log-entry.success {
            color: #44ff44;
            border-left-color: #44ff44;
        }

        .log-entry.warning {
            color: #ffaa00;
            border-left-color: #ffaa00;
        }

        .log-entry.info {
            color: #00ccff;
            border-left-color: #00ccff;
        }

        #debugToggle {
            position: fixed;
            bottom: 20px;
            right: 430px;
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 9999;
        }
    </style>
       <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Credenciada - Oeste Saúde</title>
    
    <!-- BASE URL para GitHub Pages -->
    <base href="/Guia-Medico-Oeste-Saude/">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

    <!-- Debug Log -->
    <button id="debugToggle">📋 Debug</button>
    <div id="debugLog"></div>

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <img src="https://oesteims.com.br/wp-content/uploads/2024/05/logo-oeste-saude-horizontal-2-300x109.png"
                         alt="Oeste Saúde"
                         class="h-12 w-auto object-contain"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="hidden items-center gap-3">
                        <div class="bg-gradient-to-br from-[#003D58] to-[#00A8B0] p-3 rounded-xl shadow-lg">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-[#003D58]">Rede Credenciada</h1>
                            <p class="text-sm text-gray-500">Oeste Saúde</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading -->
    <div id="loading" class="flex flex-col items-center justify-center py-16">
        <div class="loading-spinner"></div>
        <p class="mt-4 text-gray-600 font-semibold">Carregando aplicação...</p>
    </div>

    <!-- Scripts -->
    <script>
        // ==================== DEBUG LOG ====================
        const DebugLog = (() => {
            const logContainer = document.getElementById('debugLog');
            const toggleBtn = document.getElementById('debugToggle');
            let isVisible = false;

            const log = (message, type = 'info') => {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const timestamp = new Date().toLocaleTimeString();
                entry.textContent = `[${timestamp}] ${message}`;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
                console.log(`[${type.toUpperCase()}] ${message}`);
            };

            toggleBtn.addEventListener('click', () => {
                isVisible = !isVisible;
                logContainer.style.display = isVisible ? 'block' : 'none';
                toggleBtn.textContent = isVisible ? '✅ Debug' : '📋 Debug';
            });

            logContainer.style.display = 'none';

            return { log };
        })();

        // ==================== CARREGAMENTO DE ARQUIVOS ====================
        const FileLoader = (() => {
            const loadScript = (src) => {
                return new Promise((resolve, reject) => {
                    DebugLog.log(`Tentando carregar: ${src}`, 'info');
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = () => {
                        DebugLog.log(`✓ Carregado: ${src}`, 'success');
                        resolve();
                    };
                    script.onerror = () => {
                        DebugLog.log(`✗ ERRO ao carregar: ${src}`, 'error');
                        reject(new Error(`Falha ao carregar ${src}`));
                    };
                    document.head.appendChild(script);
                });
            };

            const loadCSS = (href) => {
                return new Promise((resolve, reject) => {
                    DebugLog.log(`Tentando carregar CSS: ${href}`, 'info');
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    link.onload = () => {
                        DebugLog.log(`✓ CSS carregado: ${href}`, 'success');
                        resolve();
                    };
                    link.onerror = () => {
                        DebugLog.log(`✗ ERRO ao carregar CSS: ${href}`, 'error');
                        reject(new Error(`Falha ao carregar ${href}`));
                    };
                    document.head.appendChild(link);
                });
            };

            return { loadScript, loadCSS };
        })();

        // ==================== INICIALIZAÇÃO ====================
        (async () => {
            try {
                DebugLog.log('Iniciando aplicação...', 'info');
                DebugLog.log(`URL atual: ${window.location.href}`, 'info');
                DebugLog.log(`Diretório base: ${window.location.pathname}`, 'info');

                // Carrega CSS
                await FileLoader.loadCSS('styles.css');

                // Carrega dados
                await FileLoader.loadScript('js/dados.js');
                DebugLog.log(`Dados carregados: ${window.DADOS_COMPLETOS?.prestadores?.length || 0} prestadores`, 'success');

                // Carrega módulos
                await FileLoader.loadScript('js/app.js');

                // Inicializa app
                if (typeof init === 'function') {
                    init();
                    DebugLog.log('Aplicação inicializada com sucesso!', 'success');
                } else {
                    DebugLog.log('Função init() não encontrada!', 'error');
                }

                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                DebugLog.log(`ERRO CRÍTICO: ${error.message}`, 'error');
                document.getElementById('loading').innerHTML = `
                    <div class="text-center">
                        <h2 class="text-2xl font-bold text-red-600 mb-4">Erro ao carregar aplicação</h2>
                        <p class="text-gray-600 mb-4">${error.message}</p>
                        <p class="text-sm text-gray-500">Abra o console (F12) ou clique em "Debug" para mais detalhes</p>
                    </div>
                `;
            }
        })();
    </script>

</body>
</html>
